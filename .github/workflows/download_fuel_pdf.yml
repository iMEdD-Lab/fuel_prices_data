name: Download Latest Fuel PDF

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:       # manual trigger

jobs:
  download_and_merge:
    runs-on: ubuntu-latest
    steps:
      
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false   # Important!

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pdfplumber pandas openpyxl
      
      - name: Run downloader script
        run: python code_for_download.py

      - name: Merge PDF data into XLSX
        run: python merge_to_file.py

      - name: Commit and push updated XLSX
        env:
          GH_PAT: ${{ secrets.FUEL_PAT }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add "prices_of_petrol.xlsx"
          git diff --quiet && git diff --staged --quiet || git commit -m "Update petrol prices XLSX"
          git push https://$GH_PAT@github.com/Nik2014/fuel_prices.git main